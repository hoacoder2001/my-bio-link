<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Links - Trang cá nhân của tôi</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            /* Ảnh nền IT kèm lớp phủ màu đen mờ (rgba) để làm nổi bật chữ */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url("background-my-web.png");
            background-size: cover; /* Ép ảnh vừa vặn với toàn bộ màn hình */
            background-position: center; /* Căn giữa bức ảnh */
            background-attachment: fixed; /* Giữ ảnh cố định khi cuộn chuột */
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
            margin: 0;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Tùy chỉnh ảnh đại diện */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        p {
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .link-card {
            background-color: white;
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 50px; /* Bo tròn kiểu viên thuốc */
            font-weight: bold;
            transition: all 0.3s ease;
        }

            /* Thêm khoảng cách cho icon */
            .link-card i {
                margin-right: 10px;
                font-size: 1.2rem;
            }

            .link-card:hover {
                transform: scale(1.05);
                background-color: #f0f0f0;
            }

        /* Màu sắc cho từng Icon */
        .fa-github {
            color: #333;
        }

        .fa-facebook {
            color: #1877f2;
        }

        .fa-instagram {
            color: #e4405f;
        }
        .fa-linkedin {
            color: #0077b5;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="avatar.jpg" alt="Avatar" class="profile-img">

        <h1>Hoa Van Nguyen</h1>
        <p>Bim Developer</p>

        <a href="https://github.com/hoacoder2001" target="_blank" class="link-card">
            <i class="fab fa-github"></i> GitHub
        </a>
        <a href="https://www.facebook.com/hoabien1409/" target="_blank" class="link-card">
            <i class="fab fa-facebook"></i> Facebook
        </a>
        <a href="https://www.instagram.com/nguyenvanhoa_68/" target="_blank" class="link-card">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://www.linkedin.com/in/hoa-nguyen-van-250a602ab/" target="_blank" class="link-card">
            <i class="fab fa-linkedin"></i> Linkedin
        </a>
    </div>

</body>
</html>
